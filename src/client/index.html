<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DPS Signal Controller · Frequency Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9f0f5 0%, #d9e2ec 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 1px 3px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 560px;
            padding: 2rem 2rem 2.2rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1A2A3F, #1e3a5f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: #eef2ff;
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #1e4b7a;
            letter-spacing: normal;
        }

        .sub {
            color: #4b5e77;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            border-left: 3px solid #3b82f6;
            padding-left: 12px;
            font-weight: 450;
        }

        .info-panel {
            background: #f8fafc;
            border-radius: 32px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #e2edf7;
            box-shadow: inset 0 1px 2px #ffffff80, 0 4px 8px rgba(0,0,0,0.02);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: #5c6f87;
        }

        .info-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f2b3d;
            line-height: 1;
        }

        .info-value small {
            font-size: 1rem;
            font-weight: 500;
            color: #54708f;
        }

        .clients-count {
            background: #eef3fc;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: #0369a1;
        }

        .update-area {
            background: white;
            border-radius: 36px;
            padding: 1.6rem;
            margin-top: 0.5rem;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.1);
            border: 1px solid #eef2f8;
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 20px;
        }

        .input-field {
            flex: 2;
            min-width: 160px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #3f5a7c;
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1.5px solid #cfdfed;
            border-radius: 40px;
            background: #ffffff;
            transition: 0.2s;
            font-family: monospace;
            color: #0f2b3d;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        button {
            background: #1f5e8e;
            border: none;
            padding: 14px 28px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.1);
            flex: 1;
            justify-content: center;
        }

        button:hover {
            background: #0e4a72;
            transform: scale(0.98);
            box-shadow: 0 2px 4px -1px rgba(0,0,0,0.1);
        }

        button:active {
            background: #083b5a;
        }

        .refresh-btn {
            background: #3b5b7c;
            margin-top: 4px;
        }

        .refresh-btn:hover {
            background: #2c4b6b;
        }

        .status-msg {
            margin-top: 1.4rem;
            font-size: 0.8rem;
            padding: 10px 15px;
            border-radius: 60px;
            background: #f1f5f9;
            text-align: center;
            color: #2c4a6e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-msg.error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .status-msg.success {
            background: #e0f2fe;
            color: #0369a1;
        }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #b9d0e8;
            border-radius: 50%;
            border-top-color: #1f5e8e;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        hr {
            margin: 20px 0 8px;
            border: none;
            border-top: 1px solid #e2edf7;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.5rem;
            color: #6c85a2;
        }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 8px;">
        <h1>⚡ DPS Signal <span style="font-weight:500;">Controller</span></h1>
        <span class="badge">REST API · TCP bridge</span>
    </div>
    <div class="sub">Manage output frequency — updates broadcast to all connected MCUs</div>

    <div class="info-panel">
        <div class="info-item">
            <span class="info-label">📡 CURRENT FREQUENCY</span>
            <div class="info-value">
                <span id="currentFreq">—</span> <small>Hz</small>
            </div>
        </div>
        <div class="info-item">
            <span class="info-label">🖥️ ACTIVE CLIENTS (MCU)</span>
            <div class="clients-count" id="clientsCount">—</div>
        </div>
    </div>

    <div class="update-area">
        <div class="input-group">
            <div class="input-field">
                <label>✏️ NEW FREQUENCY (Hz)</label>
                <input type="number" id="freqInput" value="100" step="1" min="1" placeholder="e.g., 120">
            </div>
            <button id="updateBtn">🔄 UPDATE FREQUENCY</button>
        </div>
        <button id="refreshBtn" class="refresh-btn">📡 REFRESH CURRENT DATA</button>
        <div id="statusMessage" class="status-msg">
            <span>⚡ Ready</span>
        </div>
        <hr />
        <div style="font-size: 0.75rem; color: #5f7f9e; text-align: center; margin-top: 8px;">
            POST /frequency → broadcasts to all TCP clients
        </div>
    </div>
    <footer>
        API endpoint: <code>/frequency</code> · JSON payload <code>{"frequency": &lt;Hz&gt;}</code>
    </footer>
</div>

<script>
    const API_BASE = 'localhost:8080';   // relative, works if page served from same origin (e.g., static from same host:8080)
    const FREQ_ENDPOINT = '/frequency';

    // DOM elements
    const currentFreqSpan = document.getElementById('currentFreq');
    const clientsCountSpan = document.getElementById('clientsCount');
    const freqInput = document.getElementById('freqInput');
    const updateBtn = document.getElementById('updateBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusDiv = document.getElementById('statusMessage');

    // Helper to show status (clear after timeout)
    let statusTimeout = null;
    function setStatus(message, isError = false, isSuccess = false) {
        if (statusTimeout) clearTimeout(statusTimeout);
        statusDiv.innerHTML = `<span>${message}</span>`;
        statusDiv.classList.remove('error', 'success');
        if (isError) statusDiv.classList.add('error');
        else if (isSuccess) statusDiv.classList.add('success');
        else statusDiv.classList.remove('error', 'success');
        
        if (!isError) {
            statusTimeout = setTimeout(() => {
                if (statusDiv && !statusDiv.classList.contains('error')) {
                    statusDiv.innerHTML = `<span>⚡ Ready</span>`;
                    statusDiv.classList.remove('success');
                }
            }, 2800);
        }
    }

    // Show loading state inside button (temporary)
    function setButtonLoading(btn, isLoading, originalText = null) {
        if (isLoading) {
            btn.dataset.originalText = btn.innerText;
            btn.disabled = true;
            btn.style.opacity = '0.7';
            btn.innerHTML = '<span class="loader"></span> Updating...';
        } else {
            btn.disabled = false;
            btn.style.opacity = '1';
            if (btn.dataset.originalText) {
                btn.innerHTML = btn.dataset.originalText;
            } else if (originalText) {
                btn.innerText = originalText;
            } else {
                btn.innerHTML = '🔄 UPDATE FREQUENCY';
            }
        }
    }

    // GET current frequency + client count
    async function fetchFrequencyAndClients() {
        try {
            setStatus('📡 Fetching current frequency...', false, false);
            const response = await fetch(`${API_BASE}${FREQ_ENDPOINT}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status} · ${response.statusText}`);
            }

            const data = await response.json();
            // expected: { frequency: number }   (clients count only appears on POST, but API spec GET returns only freq)
            // However we can still fetch only freq from GET, but we also want clients count.
            // Unfortunately GET /frequency returns only {frequency}. To get clients count we could either
            // do an extra POST with same freq? That would be wasteful. Instead we will also call a dummy? no.
            // BUT note: the API spec GET returns only frequency, but the UI shows clients count.
            // The API does not provide a route to get clients count separately. So we keep clients count from last POST response.
            // We'll store clients count in a variable and update it from POST, and also initially we try to guess?
            // Better: We will store last known clients count, and when we refresh we only update freq.
            // Clients count will be shown from the most recent POST or from an initial value. We'll show "N/A" or fetch via a custom?
            // Since GET does NOT return clients, we'll show "—" until user updates or we can also simulate by calling POST with same freq?
            // That would be wrong. Alternative: we extend UI: Show "clients" from last POST response.
            // I will keep a variable `lastClientsCount` that updates on POST, initial 0.
            // When user clicks Refresh (GET) – we update freq, and keep lastClientsCount.
            // Additionally, if we want clients count without POST, we could implement a separate /clients but not available.
            // But the API spec says POST returns clients count. We'll use that.
            if (data && typeof data.frequency === 'number') {
                currentFreqSpan.innerText = data.frequency;
                // update input placeholder / value to match current freq (sync)
                freqInput.value = data.frequency;
                setStatus(`✅ Frequency loaded: ${data.frequency} Hz`, false, true);
            } else {
                throw new Error('Invalid response format');
            }
        } catch (err) {
            console.error('GET error:', err);
            setStatus(`⚠️ Failed to fetch frequency: ${err.message}. Is server running?`, true, false);
            currentFreqSpan.innerText = '?';
        }
    }

    // global variable to keep track of active clients (from POST responses)
    let activeClients = null;

    // update clients count display
    function updateClientsDisplay(count) {
        if (count !== undefined && count !== null) {
            activeClients = count;
            clientsCountSpan.innerText = count;
        } else if (activeClients !== null) {
            clientsCountSpan.innerText = activeClients;
        } else {
            clientsCountSpan.innerText = '—';
        }
    }

    // POST new frequency
    async function updateFrequency(newFreqHz) {
        if (!newFreqHz || newFreqHz <= 0) {
            setStatus('❌ Frequency must be a positive integer ( > 0 )', true, false);
            return false;
        }

        setButtonLoading(updateBtn, true);
        setStatus(`⏳ Sending ${newFreqHz} Hz to controller...`, false, false);

        try {
            const response = await fetch(`${API_BASE}${FREQ_ENDPOINT}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ frequency: newFreqHz })
            });

            if (!response.ok) {
                let errorDetail = `HTTP ${response.status}`;
                try {
                    const errBody = await response.json();
                    errorDetail = errBody.detail || errorDetail;
                } catch (_) {}
                throw new Error(errorDetail);
            }

            const data = await response.json();
            // expected: { frequency: number, clients: number }
            if (typeof data.frequency === 'number') {
                currentFreqSpan.innerText = data.frequency;
                // if clients count is provided (should be)
                if (typeof data.clients === 'number') {
                    updateClientsDisplay(data.clients);
                } else {
                    // fallback: keep previous
                    updateClientsDisplay(activeClients);
                }
                freqInput.value = data.frequency;
                setStatus(`🎯 Frequency updated → ${data.frequency} Hz · active MCUs: ${data.clients ?? '?'}`, false, true);
                return true;
            } else {
                throw new Error('Malformed response from server');
            }
        } catch (err) {
            console.error('POST error:', err);
            setStatus(`🔥 Update failed: ${err.message}`, true, false);
            return false;
        } finally {
            setButtonLoading(updateBtn, false);
        }
    }

    // Manual refresh: fetch current freq (GET) and preserve last known clients count,
    // but also we can optionally try to infer clients if we do a no-op? not needed.
    async function manualRefresh() {
        setStatus('🔄 Refreshing frequency data...');
        try {
            const response = await fetch(`${API_BASE}${FREQ_ENDPOINT}`, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error(`GET ${response.status}`);
            const data = await response.json();
            if (data && typeof data.frequency === 'number') {
                currentFreqSpan.innerText = data.frequency;
                freqInput.value = data.frequency;
                setStatus(`📟 Frequency refreshed: ${data.frequency} Hz`, false, true);
                // clients count remains same as last known (from POST or initial)
                updateClientsDisplay(activeClients);
            } else {
                throw new Error('Invalid data');
            }
        } catch (err) {
            setStatus(`⚠️ Refresh error: ${err.message}`, true, false);
        }
    }

    // init: load frequency, set default active clients display (unknown)
    async function init() {
        updateClientsDisplay(null);   // show dash initially
        try {
            await fetchFrequencyAndClients();
        } catch (e) {
            currentFreqSpan.innerText = 'ERR';
        }
        // after GET we still don't have clients count, try to see if any previous localStorage? not needed.
        // We'll set placeholder to '?' but user will get clients only after first POST.
        // Optionally, we could send a POST with same freq to get clients count? invasive. no.
        // Instead the interface shows that after an update clients appear.
        // Additional: If the server returns clients count on GET - but spec doesn't require it. So we treat gracefully.
        // Show hint
        if (activeClients === null) {
            clientsCountSpan.innerText = '? (update to see)';
        }
    }

    // Event binding
    updateBtn.addEventListener('click', () => {
        let rawValue = freqInput.value.trim();
        if (rawValue === "") {
            setStatus("⚠️ Please enter a frequency value", true);
            return;
        }
        let freq = Number(rawValue);
        if (isNaN(freq) || !Number.isInteger(freq) || freq <= 0) {
            setStatus("❌ Frequency must be a positive integer (Hz)", true);
            return;
        }
        updateFrequency(freq);
    });

    refreshBtn.addEventListener('click', () => {
        manualRefresh();
    });

    // allow pressing Enter in input field
    freqInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            updateBtn.click();
        }
    });

    // set initial frequency value from GET and show welcome status
    init().catch(console.warn);

    // Additional style for dynamic clients dash
    // Show tooltip-like explanation on clients dash if unknown
    const clientsElement = document.getElementById('clientsCount');
    if (clientsElement) {
        clientsElement.title = "Number of connected MCUs (updated after POST /frequency)";
    }
</script>
</body>
</html>
