name: Server Tests

on:
  push:
    branches: [master]
    paths:
      - 'src/server/**'
      - '.github/workflows/server-tests.yml'
  pull_request:
    branches: [master]
    paths:
      - 'src/server/**'
      - '.github/workflows/server-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            src/server/requirements.txt
            src/server/requirements-test.txt

      - name: Install dependencies
        run: |
          pip install -r src/server/requirements.txt
          pip install -r src/server/requirements-test.txt

      - name: Run tests
        run: pytest src/server/tests/ -v
